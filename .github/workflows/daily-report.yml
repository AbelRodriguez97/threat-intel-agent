name: Daily Threat Intelligence Report

on:
  # Run every day at 08:00 UTC (10:00 Spain summer time)
  schedule:
    - cron: "0 8 * * *"

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of CVEs to analyze"
        required: false
        default: "2"

jobs:
  generate-report:
    name: Generate threat intelligence report
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the report back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LOG_LEVEL: INFO
        run: |
          LIMIT=${{ github.event.inputs.limit || '2' }}
          python -m src.main --limit $LIMIT --output-dir reports

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/
          # Only commit if there are changes (avoids empty commits)
          git diff --staged --quiet || git commit -m "chore(reports): auto-generate daily threat intelligence report [skip ci]"
          git push